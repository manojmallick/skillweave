# document-grounding-prototype.pipeline.yaml
# SkillWeave v0.1.0 — the prototype chain (human-readable contract).
# The TypeScript runtime in src/ is the executable form of this declaration.

name: document-grounding-prototype
version: 0.1.0
domain: documents
description: "proves SigMap's ask -> validate -> judge -> learn pattern on documents"

state_schema: document-grounding-state@0.1

executor:
  primary: anthropic/claude-opus-4-8
  fallback: heuristic            # offline groundedness scorer when no API key

checkpoint: after_each_skill
on_failure: halt_and_expose

pipeline:
  - skill: parse-input           # maps to: sigmap ask
    execution_class: deterministic
    asserts: ["at least one content block is produced"]

  - skill: validate-coverage     # maps to: sigmap validate
    execution_class: deterministic
    depends_on: parse-input
    asserts: ["coverage_score >= 0.70"]

  - skill: boundary-judge        # maps to: sigmap judge
    execution_class: tool
    depends_on: validate-coverage
    judge: true
    confidence_threshold: 0.80

  - skill: memory-update         # maps to: sigmap learn
    execution_class: deterministic
    depends_on: boundary-judge
    writes: .context/skillweave-memory.ndjson
