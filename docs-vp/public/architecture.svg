<svg xmlns="http://www.w3.org/2000/svg" width="960" height="360" viewBox="0 0 960 360" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#9aa0ad"/>
    </marker>
  </defs>

  <rect x="6" y="6" width="948" height="348" rx="16" fill="#fbfbfd" stroke="#e3e3ea"/>

  <text x="480" y="42" text-anchor="middle" font-size="20" font-weight="700" fill="#1f2330">SkillWeave — document-grounding chain</text>
  <text x="480" y="64" text-anchor="middle" font-size="12.5" fill="#6b7280">ask → validate → judge → learn, generalised from code to documents</text>

  <!-- sigmap mapping labels -->
  <g font-size="11" fill="#9aa0ad" text-anchor="middle">
    <text x="135" y="100">sigmap ask</text>
    <text x="365" y="100">sigmap validate</text>
    <text x="595" y="100">sigmap judge</text>
    <text x="825" y="100">sigmap learn</text>
  </g>

  <!-- skill boxes -->
  <g>
    <rect x="40" y="116" width="190" height="64" rx="10" fill="#f1f3f7" stroke="#c7ccd6"/>
    <text x="135" y="153" text-anchor="middle" font-size="14.5" font-weight="600" fill="#1f2330">parse-input</text>

    <rect x="270" y="116" width="190" height="64" rx="10" fill="#f1f3f7" stroke="#c7ccd6"/>
    <text x="365" y="153" text-anchor="middle" font-size="14.5" font-weight="600" fill="#1f2330">validate-coverage</text>

    <rect x="500" y="116" width="190" height="64" rx="10" fill="#efeafe" stroke="#7c6af7" stroke-width="1.6"/>
    <text x="595" y="148" text-anchor="middle" font-size="14.5" font-weight="700" fill="#3a2f7a">extract-highlights</text>
    <text x="595" y="166" text-anchor="middle" font-size="10.5" fill="#7c6af7">⚖ judged · routed · retried</text>

    <rect x="730" y="116" width="190" height="64" rx="10" fill="#f1f3f7" stroke="#c7ccd6"/>
    <text x="825" y="153" text-anchor="middle" font-size="14.5" font-weight="600" fill="#1f2330">memory-update</text>
  </g>

  <!-- arrows -->
  <g stroke="#9aa0ad" stroke-width="2" marker-end="url(#arrow)">
    <line x1="232" y1="148" x2="266" y2="148"/>
    <line x1="462" y1="148" x2="496" y2="148"/>
    <line x1="692" y1="148" x2="726" y2="148"/>
  </g>

  <!-- class labels -->
  <g font-size="11" fill="#6b7280" text-anchor="middle">
    <text x="135" y="200">deterministic</text>
    <text x="365" y="200">deterministic</text>
    <text x="595" y="200" fill="#7c6af7" font-weight="600">probabilistic</text>
    <text x="825" y="200">deterministic</text>
  </g>

  <!-- STATE bar -->
  <rect x="40" y="224" width="880" height="34" rx="8" fill="#eef2f7" stroke="#d3d9e3"/>
  <text x="480" y="246" text-anchor="middle" font-size="12.5" fill="#3a4250"><tspan font-weight="700">STATE</tspan>  ·  typed, write-scoped (base-io), checkpointed after every skill  ·  NDJSON trace via base-log</text>

  <!-- reliability legend -->
  <rect x="40" y="280" width="880" height="56" rx="10" fill="#f7f5ff" stroke="#e0daf9"/>
  <text x="60" y="303" font-size="12.5" font-weight="700" fill="#3a2f7a">Reliability layer</text>
  <text x="60" y="323" font-size="12" fill="#5b5470">applied at probabilistic boundaries only · deterministic skills carry zero overhead</text>
  <g font-size="11.5" text-anchor="end">
    <text x="900" y="301" fill="#5b5470"><tspan font-weight="600" fill="#3a2f7a">confidence routing</tspan>  ≥0.85 proceed · 0.65–0.85 flag · &lt;0.65 retry</text>
    <text x="900" y="318" fill="#5b5470"><tspan font-weight="600" fill="#3a2f7a">auto-judge</tspan>  groundedness ≥ threshold</text>
    <text x="900" y="335" fill="#5b5470"><tspan font-weight="600" fill="#3a2f7a">retry</tspan>  with negative context (budget 2) → else halt &amp; expose</text>
  </g>
</svg>
